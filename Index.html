<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ping Pong Game</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; touch-action: none; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let paddleHeight = 100;
let playerY = canvas.height / 2 - paddleHeight/2;
let aiY = canvas.height / 2 - paddleHeight/2;
let ballX = canvas.width / 2;
let ballY = canvas.height / 2;
let dx = 5, dy = 5;

canvas.addEventListener("touchmove", function(e) {
  e.preventDefault();
  playerY = e.touches[0].clientY - paddleHeight/2;
}, { passive: false });

function drawRect(x,y,w,h){ ctx.fillStyle="white"; ctx.fillRect(x,y,w,h); }
function drawCircle(x,y,r){ ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); }

function loop() {
  ballX += dx;
  ballY += dy;
  aiY += (ballY - (aiY + paddleHeight/2)) * 0.1;

  if(ballY<0||ballY>canvas.height) dy*=-1;
  if(ballX<20 && ballY>playerY && ballY<playerY+paddleHeight) dx*=-1;
  if(ballX>canvas.width-20 && ballY>aiY && ballY<aiY+paddleHeight) dx*=-1;
  if(ballX<0||ballX>canvas.width) { ballX=canvas.width/2; ballY=canvas.height/2; }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawRect(0,playerY,10,paddleHeight);
  drawRect(canvas.width-10,aiY,10,paddleHeight);
  drawCircle(ballX,ballY,10);

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
